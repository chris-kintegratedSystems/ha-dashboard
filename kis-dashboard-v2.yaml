title: mobilev2
views:
  # ── Home ──────────────────────────────────────────────────────────────────────
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 2
    sections:
      # Scenes — full width
      - title: ""
        type: grid
        column_span: 2
        cards:
          - type: custom:kis-scenes

      # Security — left column
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-control-panel

      # Priority view — right column (cameras + vehicles + weather carousel)
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-priority-view

  # ── Settings ──────────────────────────────────────────────────────────────────
  - title: Settings
    path: settings
    icon: mdi:cog
    type: sections
    max_columns: 1
    sections:
      - title: ""
        type: grid
        cards:
          - type: custom:kis-settings
