title: mobilev2
views:
  # ── Home ──────────────────────────────────────────────────────────────────────
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 2
    sections:
      # Scenes — left 3 with header
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-scenes
            title: "SCENES"
            scenes:
              - script.scene_good_morning
              - script.scene_good_night
              - script.scene_away_mode

      # Scenes — right 3
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-scenes
            scenes:
              - script.scene_welcome_home
              - script.scene_movie_time
              - script.scene_dinner_time

      # Security — left column
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-control-panel

      # Priority view — right column (cameras + vehicles + weather carousel)
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-priority-view

  # ── Settings ──────────────────────────────────────────────────────────────────
  - title: Settings
    path: settings
    icon: mdi:cog
    type: sections
    max_columns: 1
    sections:
      - title: ""
        type: grid
        cards:
          - type: custom:kis-settings
