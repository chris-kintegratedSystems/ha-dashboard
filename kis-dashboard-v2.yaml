title: mobilev2
views:
  # ── Home ──────────────────────────────────────────────────────────────────────
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 2
    sections:
      # Scenes — full width
      - title: ""
        type: grid
        column_span: 2
        cards:
          - type: custom:kis-scenes

      # Security — left column
      - title: ""
        type: grid
        column_span: 1
        cards:
          - type: custom:kis-control-panel

      # Camera zone — right column
      - title: ""
        type: grid
        column_span: 1
        cards:
          # Doorbell camera (priority lock = doorbell)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: doorbell
            card:
              type: picture-entity
              entity: camera.doorbell
              aspect_ratio: "16:9"
              show_name: false
              show_state: false
              camera_view: live
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--error-color, #f04060) !important;
                    border-radius: 14px !important;
                    box-shadow: 0 0 12px rgba(240,64,96,0.35) !important;
                    overflow: hidden;
                  }

          # Living room camera (priority lock = living_room)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: living_room
            card:
              type: picture-entity
              entity: camera.nest_cam_1
              aspect_ratio: "16:9"
              show_name: false
              show_state: false
              camera_view: live
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--accent-color, #00d4f0) !important;
                    border-radius: 14px !important;
                    box-shadow: 0 0 12px rgba(0,212,240,0.25) !important;
                    overflow: hidden;
                  }

          # Ben's room camera (priority lock = bens_room)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: bens_room
            card:
              type: picture-entity
              entity: camera.nest_cam_2
              aspect_ratio: "16:9"
              show_name: false
              show_state: false
              camera_view: live
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--accent-color, #00d4f0) !important;
                    border-radius: 14px !important;
                    box-shadow: 0 0 12px rgba(0,212,240,0.25) !important;
                    overflow: hidden;
                  }

          # Nanit Benjamin (priority lock = nanit_benjamin)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: nanit_benjamin
            card:
              type: picture-entity
              entity: camera.nanit_benjamin
              aspect_ratio: "16:9"
              show_name: false
              show_state: false
              camera_view: live
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--accent-color, #00d4f0) !important;
                    border-radius: 14px !important;
                    box-shadow: 0 0 12px rgba(0,212,240,0.25) !important;
                    overflow: hidden;
                  }

          # Nanit Travel (priority lock = nanit_travel)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: nanit_travel
            card:
              type: picture-entity
              entity: camera.nanit_travel
              aspect_ratio: "16:9"
              show_name: false
              show_state: false
              camera_view: live
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--accent-color, #00d4f0) !important;
                    border-radius: 14px !important;
                    box-shadow: 0 0 12px rgba(0,212,240,0.25) !important;
                    overflow: hidden;
                  }

          # Empty state placeholder (no camera active)
          - type: conditional
            conditions:
              - entity: sensor.priority_camera
                state: none
            card:
              type: markdown
              content: " "
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    border: 1px dashed rgba(255,255,255,0.08) !important;
                    border-radius: 14px !important;
                    box-shadow: none !important;
                    min-height: 200px;
                  }

  # ── Settings ──────────────────────────────────────────────────────────────────
  - title: Settings
    path: settings
    icon: mdi:cog
    type: sections
    max_columns: 1
    sections:
      - title: ""
        type: grid
        cards:
          - type: custom:kis-settings
